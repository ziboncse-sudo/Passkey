name: password_manager
description: A secure local password manager app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  provider: ^6.1.2
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  iconsax: ^0.0.8
  clipboard: ^0.1.3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
